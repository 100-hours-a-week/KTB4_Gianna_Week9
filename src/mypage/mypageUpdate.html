<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치</title>
    <script type="module" defer src="./mypageUpdate.js"></script>
</head>
<body>
    <div id="headerContainer"></div>
    
    <h1>회원정보수정</h1>
    <div class="mypage-update-container">
        <h5 id="profilePictureLabel">프로필 사진 </h5>
        <input id="newProfilePicture" type="file" accept="image/png, image/jpeg"/>

        <h5 id="emailLabel">이메일</h5>
        <h6 id="emailDesc"></h6>

        <h5 id="nickNameLabel">닉네임</h5>
        <input id="nicknameText" type="text"></input>
        <h6 id="nicknameHelperText">*helper text</h6>

        <button id="updateBtn">수정하기</button>
        <button id="deleteBtn">회원 탈퇴</button>
        
        <h4 id="toastMsg"></h4>
    </div>
</body>
</html>
