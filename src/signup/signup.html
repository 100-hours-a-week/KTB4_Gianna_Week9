<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치</title>
    <script defer src="signup.js"></script>
</head>
<body>
    <h1>회원가입</h1>
    <div id="signup-form">
        <h4>프로필 사진</h4>
        <input id="profile-picture" type="file" accept="image/png, image/jpeg"/>

        <h4>이메일</h4>
        <input id="email" type="text" placeholder="이메일을 입력하세요" />

        <h4>비밀번호</h4>
        <input id="password" type="password" placeholder="비밀번호를 입력하세요"/>

        <h4>비밀번호 확인</h4>
        <input id="confirm-password" type="password" placeholder="비밀번호를 다시 입력하세요"/>

        <h4>닉네임</h4>
        <input id="nickname" type="text" placeholder="닉네임을 입력하세요"/>

        <br/><br/>
        <button id="signup-btn">회원가입</button>
    </div>
</body>
</html>
