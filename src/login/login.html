<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아무 말 대잔치</title>
    <link rel="stylesheet" href="login.css">
    <script type="module" defer src="login.js"></script>
</head>
<body>
    <header class="page-header">
        <h1>Raffiné</h1>
    </header>

    <main class="login-page">
        <section class="login-container">
            <h2>로그인</h2>

            <form id="login-form" action="http://localhost:8080/login-process" method="post">
                <label for="email">이메일</label>
                <input id="email" class ="email-label" name="email" type="text" placeholder="이메일을 입력하세요" />
                <p id="emailHelperText" class="helper-text"></p>

                <label for="password">비밀번호</label>
                <input id="password" class="pwd-label" name="password" type="password" placeholder="비밀번호를 입력하세요"/>
                <p id="pwdHelperText" class="helper-text"></p>

                <button id="loginBtn" type="submit" disabled>로그인</button>
            </form>

            <a class="signup-link" href="../signup/signup.html">회원가입</a>
        </section>
    </main>
</body>
</html>
